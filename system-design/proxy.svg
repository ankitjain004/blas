<polygon points="515,285 580,330 515,375 450,330" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2"/>
<rect x="665" y="250" width="120" height="50" rx="10" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<rect x="665" y="315" width="120" height="50" rx="10" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<rect x="665" y="380" width="120" height="50" rx="10" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<polyline points="165,127 235,127" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="390,127 460,127" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="590,127 660,127" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="165,327 235,327" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="390,327 445,327" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="585,305 655,270" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="585,330 655,330" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="585,355 655,390" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start"><tspan x="250" y="26">Proxy = an Intermediary that Forwards Requests</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#5b8dee" text-anchor="start"><tspan x="40" y="74">■ FORWARD PROXY  —  sits in front of CLIENTS, acts on behalf of the client</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="133.1">Client</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="320" y="122.86">Forward</tspan><tspan x="320" y="143.34">Proxy</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="133.1">Internet</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="725" y="133.1">Server</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="235" y="177">hides CLIENT identity · caching · content filtering · bypass geo-blocks</tspan><tspan x="235" y="192.36">examples: corporate proxy, VPN, Squid</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#2f9e44" text-anchor="start"><tspan x="40" y="264">■ REVERSE PROXY  —  sits in front of SERVERS, acts on behalf of the server</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="333.1">Client</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="315" y="333.1">Internet</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="515" y="325.94">Reverse</tspan><tspan x="515" y="343.86">Proxy</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="725" y="280.6">Server A</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="725" y="345.6">Server B</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="725" y="410.6">Server C</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="235" y="457">hides SERVER topology · load balancing · TLS termination · caching · DDoS shield</tspan><tspan x="235" y="472.36">examples: Nginx, HAProxy, Cloudflare, AWS ALB  —  an API Gateway is a reverse proxy + brains</tspan></text>
</g>
</svg>
