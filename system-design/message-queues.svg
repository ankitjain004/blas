<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start"><tspan x="300" y="26">Message Queues — Patterns &amp; Delivery</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="13" fill="#5b8dee" text-anchor="start"><tspan x="40" y="83">■ POINT-TO-POINT (work queue)  — one message -&gt; one consumer</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="140.6">Producer</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="320" y="130.94">Queue</tspan><tspan x="320" y="148.85999999999999">(FIFO)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="113.1">Worker 1</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="178.1">Worker 2</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="690" y="132.86">Dead Letter</tspan><tspan x="690" y="153.34">Queue (DLQ)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="600" y="187">after N failed</tspan><tspan x="600" y="202.36">ack retries</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="13" fill="#2f9e44" text-anchor="start"><tspan x="40" y="273">■ PUBLISH / SUBSCRIBE  — one message -&gt; all subscribers</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="330.6">Publisher</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="320" y="320.94">Topic</tspan><tspan x="320" y="338.86">(broker)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="287.86">Sub A</tspan><tspan x="525" y="308.34000000000003">(email)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="342.86">Sub B</tspan><tspan x="525" y="363.34000000000003">(analytics)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="402.86">Sub C</tspan><tspan x="525" y="423.34000000000003">(audit)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="40" y="472">Delivery guarantees: at-most-once | at-least-once (+ idempotency) | exactly-once</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="40" y="502">ack/nack drives redelivery; visibility timeout hides in-flight msgs</tspan></text>
</g>
</svg>
