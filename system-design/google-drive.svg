  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#495057"/>
  </marker>
</defs>
<rect x="0" y="0" width="1193" height="747" fill="#ffffff"/>
<g transform="translate(5.599999999999994,18)">
<rect x="40" y="110" width="120" height="60" rx="10" fill="#e3fafc" stroke="#1e1e1e" stroke-width="2"/>
<rect x="40" y="210" width="120" height="60" rx="10" fill="#e3fafc" stroke="#1e1e1e" stroke-width="2"/>
<polygon points="295,110 340,150 295,190 250,150" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2"/>
<rect x="420" y="95" width="190" height="90" rx="10" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<rect x="420" y="215" width="190" height="90" rx="10" fill="#bac8ff" stroke="#1e1e1e" stroke-width="2"/>
<ellipse cx="850" cy="142.5" rx="105" ry="47.5" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
<ellipse cx="845" cy="262.5" rx="100" ry="42.5" fill="#d8f5a2" stroke="#1e1e1e" stroke-width="2"/>
<rect x="360" y="375" width="230" height="56" rx="10" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
<rect x="360" y="495" width="280" height="90" rx="10" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
<rect x="720" y="330" width="250" height="56" rx="10" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
<polyline points="165,140 240,140" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="345,150 415,150" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="615,140 735,140" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="615,260 745,260" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="515,305 515,365" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="475,431 475,481" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="360,540 160,280" fill="none" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="850,190 850,220" fill="none" stroke="#868e96" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="850,305 850,330" fill="none" stroke="#868e96" stroke-width="2" marker-end="url(#arrow)"/>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start"><tspan x="300" y="26">Design Google Drive — Upload · Download · Sync · Notify</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="135.35999999999999">Device A</tspan><tspan x="100" y="155.83999999999997">(Web)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="235.35999999999999">Device B</tspan><tspan x="100" y="255.83999999999997">(Mobile)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="170" y="101">chunk upload</tspan><tspan x="170" y="115.08">/files (HTTPS)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="295" y="154.9">LB</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="515" y="125.11999999999999">Block Servers</tspan><tspan x="515" y="145.6">split→hash→encrypt</tspan><tspan x="515" y="166.07999999999998">dedup + delta</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="515" y="245.12">Metadata Service</tspan><tspan x="515" y="265.6">file tree, versions</tspan><tspan x="515" y="286.08000000000004">ACL / sharing</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="620" y="121">PUT blocks</tspan><tspan x="620" y="135.08">(content-addressed)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="850" y="129.48">Object Storage</tspan><tspan x="850" y="147.4">(S3, AES-256)</tspan><tspan x="850" y="165.32000000000002">11-nines durable</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="845" y="258.44">Metadata DB</tspan><tspan x="845" y="276.35999999999996">(SQL, sharded)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="520" y="331">publish change event</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="475" y="398.94">Notification Queue</tspan><tspan x="475" y="416.86">(Kafka)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="500" y="525.12">Sync / Notification Service</tspan><tspan x="500" y="545.6">WebSocket + long poll</tspan><tspan x="500" y="566.08">fan-out to other devices</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#00d4aa" text-anchor="start"><tspan x="120" y="331">push: file changed →</tspan><tspan x="120" y="345.08">Device B pulls delta</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="845" y="353.94">Offline Backup Queue</tspan><tspan x="845" y="371.86">(cold replicas, GC)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="652">Upload = split into blocks → hash → dedup (skip blocks already stored) → encrypt → PUT to object store; metadata records the manifest + version.</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="676">Sync = on commit, Metadata Service emits an event → Kafka → Notification Service pushes to online devices over WebSocket; offline devices pull on reconnect.</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="700">Delta sync = only changed blocks travel the wire → minimal bandwidth. Strongly-consistent metadata; eventually-consistent blocks.</tspan></text>
</g>
</svg>
