<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1411 363" width="1411" height="363" font-weight="600">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#495057"/>
  </marker>
</defs>
<rect x="0" y="0" width="1411" height="363" fill="#ffffff"/>
<g transform="translate(16,18)">
<rect x="60" y="70" width="780" height="180" rx="10" fill="#dee2e6" stroke="#1e1e1e" stroke-width="2"/>
<rect x="60" y="120" width="780" height="80" rx="10" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<polyline points="70,130 130,190 190,130 250,190 310,130 370,190 430,130 490,190 550,130 610,190 670,130 730,190 790,130" fill="none" stroke="#2f9e44" stroke-width="3"/>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="18" fill="#1e1e1e" text-anchor="start"><tspan x="150" y="24">Optical Fiber — Total Internal Reflection Traps the Light</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#2f9e44" text-anchor="start"><tspan x="8" y="161">laser</tspan><tspan x="8" y="175.08">pulses</tspan><tspan x="8" y="189.16">(1 = on)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="72" y="94">CLADDING — lower refractive index (acts as a glass mirror)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#5b8dee" text-anchor="start"><tspan x="72" y="218">CORE — higher refractive index, carries the light</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#2f9e44" text-anchor="start"><tspan x="60" y="284">At each boundary light hits beyond the CRITICAL ANGLE → 100% reflects back in (Total Internal Reflection). It zig-zags down the core for kilometres, even around gentle bends.</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="60" y="316">Steeper rays travel a longer path → arrive late → modal dispersion (blurred pulse). Single-mode fiber (~9µm core) allows ~one straight path → used for the backbone &amp; undersea cables.</tspan></text>
</g>
</svg>
