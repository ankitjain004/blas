<polyline points="420,295 235,155" fill="none" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrow)"/>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start"><tspan x="300" y="26">Design Razorpay — Payment Gateway (Auth → Capture → Settle)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="100" y="145.35999999999999">Buyer</tspan><tspan x="100" y="165.83999999999997">(checkout)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="295" y="145.35999999999999">Merchant</tspan><tspan x="295" y="165.83999999999997">Backend</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="370" y="106">POST /orders</tspan><tspan x="370" y="120.08">(idempotency-key)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="525" y="135.12">API Gateway</tspan><tspan x="525" y="155.6">authN · rate-limit</tspan><tspan x="525" y="176.08">idempotency</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="580" y="282.62">Payment Service</tspan><tspan x="580" y="303.1">(orchestrator / state machine)</tspan><tspan x="580" y="323.58">created→authorized→captured→settled</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="400" y="441.97999999999996">Ledger DB</tspan><tspan x="400" y="459.9">double-entry</tspan><tspan x="400" y="477.81999999999994">(ACID, sharded)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="580" y="440.12">Token Vault</tspan><tspan x="580" y="460.6">(PCI-DSS, HSM)</tspan><tspan x="580" y="481.08">card → token</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="920" y="290.36">Risk / Fraud</tspan><tspan x="920" y="310.84000000000003">rules + ML score</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="760" y="211">authorize / capture</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="995" y="140.12">Bank / Network</tspan><tspan x="995" y="160.6">Connectors</tspan><tspan x="995" y="181.08">Visa·MC·UPI·Netbank</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="590" y="583.9399999999999">Settlement Queue (Kafka)</tspan><tspan x="590" y="601.8599999999999">async payout to merchant</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="590" y="705.36">Settlement / Payout Worker</tspan><tspan x="590" y="725.84">T+2 reconcile → merchant bank</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#00d4aa" text-anchor="start"><tspan x="150" y="261">webhook:</tspan><tspan x="150" y="275.08">payment.captured</tspan><tspan x="150" y="289.16">(signed, retried)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="782">Idempotency-key dedupes retried charge requests → never double-charge. Orchestrator is a state machine; every transition is journaled in the ledger.</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="806">Raw PAN never touches app DBs — it is tokenized in a PCI-DSS vault. Auth is sync; capture+settlement are async (Kafka) and reconciled T+1/T+2.</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="830">Webhooks are signed + retried with backoff; merchants verify the signature and treat delivery as at-least-once (idempotent handlers).</tspan></text>
</g>
</svg>
