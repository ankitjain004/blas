<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start"><tspan x="280" y="26">Price Search Service — Cache-first Vendor Aggregator</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="105" y="155.6">UI / Client</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="180" y="106">GET</tspan><tspan x="180" y="120.08">/search/product/1</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="325" y="145.35999999999999">API Gateway</tspan><tspan x="325" y="165.83999999999997">Edge Cache</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="560" y="145.35999999999999">Search Service</tspan><tspan x="560" y="165.83999999999997">(read path)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#868e96" text-anchor="start"><tspan x="565" y="221">get price:1</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="580" y="280.12">Redis (hot)</tspan><tspan x="580" y="300.6">price:{id}:{vendor}</tspan><tspan x="580" y="321.08">TTL = 1 hour</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#2f9e44" text-anchor="start"><tspan x="770" y="131">hit (fresh):</tspan><tspan x="770" y="145.08">return instantly</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#ff6b9d" text-anchor="start"><tspan x="660" y="226">miss/stale:</tspan><tspan x="660" y="240.08">publish refresh</tspan><tspan x="660" y="254.16">(serve stale,</tspan><tspan x="660" y="268.24">no blocking)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="910" y="295.94">Refresh Queue</tspan><tspan x="910" y="313.86">(Kafka, per-vendor)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="915" y="414.88">Vendor Worker Pool</tspan><tspan x="915" y="435.36">bounded concurrency</tspan><tspan x="915" y="455.84">single-flight + breaker</tspan><tspan x="915" y="476.32">retry (backoff+jitter)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="620" y="426.6">Vendor A</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="620" y="476.6">Vendor B</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="640" y="526.6">Vendor C ... 100+</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#e03131" text-anchor="start"><tspan x="690" y="391">$ paid call</tspan><tspan x="690" y="405.08">(only on miss)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="11" fill="#2f9e44" text-anchor="start"><tspan x="600" y="331">write fresh → Redis(1h)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="940" y="586.98">Price DB</tspan><tspan x="940" y="604.9">results JSONB</tspan><tspan x="940" y="622.82">(durable)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="612">Read path NEVER blocks on vendors. Fresh cache = 0 paid calls. Single-flight collapses a stampede into one refresh per vendor.</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#7048e8" text-anchor="start"><tspan x="40" y="636">On miss/stale: serve cached (flagged stale) + async fan-out. Per-vendor breaker + bulkhead isolate slow/failing vendors → partial results.</tspan></text>
</g>
</svg>
