<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start"><tspan x="230" y="26">Why an API Gateway? — Cross-cutting Concerns in One Place</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#e03131" text-anchor="start"><tspan x="40" y="69">■ WITHOUT GATEWAY  —  every service re-implements auth + rate-limit + logging</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="95" y="125.6">Mobile</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="95" y="205.6">Web</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="500" y="102.86">User Svc</tspan><tspan x="500" y="123.34">(auth+limit)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="500" y="172.85999999999999">Order Svc</tspan><tspan x="500" y="193.33999999999997">(auth+limit)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="500" y="242.85999999999999">Payment Svc</tspan><tspan x="500" y="263.34000000000003">(auth+limit)</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="12" fill="#868e96" text-anchor="start"><tspan x="600" y="162">N×M wiring,</tspan><tspan x="600" y="177.36">duplicated logic</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="14" fill="#2f9e44" text-anchor="start"><tspan x="40" y="334">■ WITH GATEWAY  —  concerns handled ONCE; services stay simple</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="95" y="390.6">Mobile</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="95" y="470.6">Web</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="370" y="420.36">API Gateway</tspan><tspan x="370" y="440.84000000000003">auth · rate-limit · route · log · TLS</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="620" y="380.6">User Svc</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="620" y="450.6">Order Svc</tspan></text>
<text font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="16" fill="#1e1e1e" text-anchor="middle"><tspan x="620" y="520.6">Payment Svc</tspan></text>
